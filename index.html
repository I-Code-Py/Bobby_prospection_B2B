<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prospect">
<title>Prospect</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html{height:100%;background:#000}
body{height:100dvh;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;position:fixed;width:100%;overscroll-behavior:none}
:root{
  --g:#00E676;--gd:#00C853;--gs:rgba(0,230,118,.12);--gb:rgba(0,230,118,.05);
  --s1:#0d0d0d;--s2:#161616;--s3:#222;
  --ln:rgba(255,255,255,.07);
  --t1:#fff;--t2:rgba(255,255,255,.5);--t3:rgba(255,255,255,.2);
  --red:#FF453A;--blue:#0A84FF;--purple:#BF5AF2;--yellow:#FFD60A;
  --st:env(safe-area-inset-top,44px);--sb:env(safe-area-inset-bottom,34px);
  --r:16px;
}
#app{display:flex;flex-direction:column;height:100dvh}
/* HEADER */
#hdr{padding-top:calc(var(--st) + 2px);background:#000;flex-shrink:0;z-index:20}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:0 20px 12px}
.logo{display:flex;align-items:center;gap:9px}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--g);box-shadow:0 0 10px var(--g);animation:glow 2.5s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 6px var(--g)}50%{box-shadow:0 0 20px var(--g),0 0 40px rgba(0,230,118,.25)}}
.logo-text{font-size:20px;font-weight:700;letter-spacing:-.4px}
/* FAB */
#fab{width:44px;height:44px;border-radius:50%;background:var(--g);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;transition:transform .12s;flex-shrink:0}
#fab:active{transform:scale(.88)}
#fab svg{width:22px;height:22px;fill:#000}
.fab-ring{position:absolute;inset:-3px;border-radius:50%;border:2px solid transparent;transition:all .3s}
#fab.has-ig .fab-ring{border-color:var(--g);animation:spin 3s linear infinite;box-shadow:0 0 16px rgba(0,230,118,.4)}
@keyframes spin{to{transform:rotate(360deg)}}
#fab.pop{animation:pop .35s cubic-bezier(.34,1.6,.64,1)}
@keyframes pop{0%{transform:scale(1)}35%{transform:scale(.82)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
/* NAV */
.nav{display:flex;padding:0 20px;border-bottom:1px solid var(--ln)}
.nb{flex:1;padding:10px 0;font-size:13px;font-weight:700;color:var(--t3);background:none;border:none;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;gap:6px;transition:color .18s}
.nb.on{color:var(--g)}
.nb.on::after{content:'';position:absolute;bottom:-1px;left:12px;right:12px;height:2px;background:var(--g);border-radius:2px 2px 0 0;box-shadow:0 0 8px var(--g)}
.nbadge{background:var(--gs);color:var(--g);font-size:10px;font-weight:900;padding:1px 6px;border-radius:8px;min-width:18px;text-align:center}
/* PAGES */
#pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);visibility:hidden;will-change:transform}
.page.left{transform:translateX(-25%)}
.page.active{transform:translateX(0);visibility:visible}
/* ADD PAGE */
#p-add{padding:20px 18px calc(var(--sb) + 80px)}
.tap-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:190px;border:1.5px dashed rgba(0,230,118,.18);border-radius:22px;background:var(--gb);margin-bottom:18px;padding:28px 20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.tap-zone::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,230,118,.07) 0%,transparent 65%);pointer-events:none}
.tap-zone.ready{border-color:rgba(0,230,118,.45);background:rgba(0,230,118,.055)}
.tap-zone:active{transform:scale(.975)}
.tz-ic{font-size:42px;margin-bottom:10px;line-height:1}
.tz-t{font-size:16px;font-weight:700;margin-bottom:5px}
.tz-s{font-size:13px;color:var(--t2);text-align:center;line-height:1.55;max-width:230px}
/* Preview */
.prev{background:var(--s1);border:1px solid var(--gs);border-radius:var(--r);padding:15px;display:flex;align-items:center;gap:13px;margin-bottom:14px;animation:rise .25s cubic-bezier(.34,1.4,.64,1) both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.prev-av{width:48px;height:48px;border-radius:50%;background:var(--s2);border:2px solid var(--g);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--g);flex-shrink:0;box-shadow:0 0 14px rgba(0,230,118,.2)}
.prev-info{flex:1;min-width:0}
.prev-name{font-size:15px;font-weight:700}
.prev-url{font-size:12px;color:var(--t2);margin-top:2px}
.prev-ok{width:26px;height:26px;border-radius:50%;background:var(--gs);border:1.5px solid var(--g);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
/* Fields */
.nf{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:13px 15px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px;transition:border-color .2s}
.nf:focus-within{border-color:rgba(0,230,118,.3)}
.nf-ic{font-size:15px;margin-top:2px;flex-shrink:0}
textarea#inp-note{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:14px;font-family:inherit;resize:none;min-height:56px;line-height:1.5}
textarea#inp-note::placeholder{color:var(--t3)}
.b2b-row{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:14px 15px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.b2b-l{font-size:14px;font-weight:600}
.b2b-s{font-size:12px;color:var(--t2);margin-top:2px}
.tog{width:50px;height:30px;border-radius:15px;background:var(--s3);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--g)}
.tok{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:transform .22s cubic-bezier(.34,1.5,.64,1);box-shadow:0 2px 6px rgba(0,0,0,.35)}
.tog.on .tok{transform:translateX(20px)}
.btn-add{width:100%;padding:16px;background:var(--g);color:#000;font-size:16px;font-weight:800;font-family:inherit;border:none;border-radius:var(--r);cursor:pointer;transition:opacity .15s,transform .1s;letter-spacing:-.1px}
.btn-add:active{opacity:.85;transform:scale(.985)}
.btn-add:disabled{opacity:.22;pointer-events:none}
/* LIST PAGE */
#p-list{padding-bottom:calc(var(--sb) + 16px)}
.sec-hdr{padding:20px 20px 6px;font-size:10px;font-weight:900;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}
/* Row */
.rw{position:relative;overflow:hidden}
.sw-bg{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:stretch}
.sw-b{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 14px;gap:3px;border:none;cursor:pointer;font-size:10px;font-weight:900;color:#fff;width:72px;text-transform:uppercase;letter-spacing:.2px}
.sw-b .si{font-size:18px;line-height:1;margin-bottom:1px}
.sw-b2b{background:var(--purple)}
.sw-nt{background:var(--blue)}
.sw-dl{background:var(--red)}
.ar{display:flex;align-items:center;padding:13px 20px;gap:13px;background:#000;border-bottom:1px solid var(--ln);position:relative;z-index:2;min-height:68px;will-change:transform;cursor:pointer;user-select:none}
.ar.ani{animation:rin .26s cubic-bezier(.34,1.3,.64,1) both}
@keyframes rin{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
.av{width:46px;height:46px;border-radius:50%;background:var(--s2);border:1.5px solid var(--ln);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:var(--t1);flex-shrink:0;position:relative;transition:border-color .2s,box-shadow .2s}
.av.gn{border-color:rgba(0,230,118,.5);box-shadow:0 0 12px rgba(0,230,118,.2)}
.av.bv{border-color:rgba(191,90,242,.45)}
.av.act .av-ring{opacity:1}
.av-ring{position:absolute;inset:-3px;border-radius:50%;border:1.5px solid var(--yellow);opacity:0;animation:spin 4s linear infinite;transition:opacity .3s}
.ri{flex:1;min-width:0}
.rn{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rs{font-size:12px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rr{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.pill{font-size:10px;font-weight:800;padding:3px 9px;border-radius:10px;white-space:nowrap}
.pp{background:rgba(255,255,255,.05);color:var(--t3)}
.pa{background:rgba(255,214,10,.1);color:var(--yellow)}
.pd{background:rgba(0,230,118,.1);color:var(--g)}
.pb{background:rgba(191,90,242,.12);color:var(--purple)}
/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;padding:90px 40px;gap:9px;text-align:center}
.em-ic{font-size:44px;opacity:.12;margin-bottom:4px}
.em-t{font-size:15px;font-weight:700;color:var(--t2)}
.em-s{font-size:13px;color:var(--t3);line-height:1.6}
/* SHEETS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:60;opacity:0;pointer-events:none;transition:opacity .22s}
.ov.on{opacity:1;pointer-events:all}
.sh{position:fixed;bottom:0;left:0;right:0;background:#0f0f0f;border-radius:22px 22px 0 0;border-top:1px solid var(--ln);padding:10px 20px calc(var(--sb) + 18px);z-index:61;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,1.18,.64,1);max-height:88dvh;overflow-y:auto}
.sh.on{transform:none}
.sh-handle{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 18px}
.sh-title{font-size:18px;font-weight:800;margin-bottom:16px;letter-spacing:-.3px}
.note-ta{width:100%;min-height:100px;padding:13px 15px;background:var(--s2);border:1px solid var(--ln);border-radius:var(--r);color:var(--t1);font-size:15px;font-family:inherit;outline:none;resize:none;-webkit-appearance:none;transition:border-color .2s}
.note-ta:focus{border-color:rgba(0,230,118,.35)}
.note-ta::placeholder{color:var(--t3)}
.sh-row{display:flex;gap:10px;margin-top:13px}
.sh-c{flex:1;padding:15px;border-radius:var(--r);border:none;background:var(--s3);color:var(--t2);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.sh-s{flex:2;padding:15px;border-radius:var(--r);border:none;background:var(--g);color:#000;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer}
/* Confirm sheet */
.cf-av{width:64px;height:64px;border-radius:50%;background:var(--s2);border:2px solid var(--yellow);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;margin:0 auto 12px;box-shadow:0 0 20px rgba(255,214,10,.15);animation:spin 4s linear infinite}
.cf-name{text-align:center;font-size:18px;font-weight:800;margin-bottom:4px}
.cf-meta{text-align:center;font-size:13px;color:var(--t2);margin-bottom:20px}
.btn-done{width:100%;padding:15px;border-radius:var(--r);border:none;background:var(--g);color:#000;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;margin-bottom:9px}
.btn-rst{width:100%;padding:13px;border-radius:var(--r);border:none;background:var(--s3);color:var(--t2);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
/* TOAST */
#toast{position:fixed;top:calc(var(--st) + 10px);left:50%;transform:translateX(-50%) translateY(-90px);background:rgba(15,15,15,.97);border:1px solid rgba(255,255,255,.08);color:#fff;padding:10px 18px;border-radius:22px;font-size:14px;font-weight:700;z-index:200;transition:transform .3s cubic-bezier(.34,1.4,.64,1);white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:7px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-inner">
      <div class="logo"><div class="logo-dot"></div><div class="logo-text">Prospect</div></div>
      <button id="fab" onclick="fabTap()" aria-label="Ajouter depuis presse-papier">
        <div class="fab-ring"></div>
        <svg viewBox="0 0 24 24"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg>
      </button>
    </div>
    <div class="nav">
      <button class="nb on" data-p="add" onclick="go('add',this)">Ajouter</button>
      <button class="nb" data-p="list" onclick="go('list',this)">Liste <span class="nbadge" id="nb">0</span></button>
    </div>
  </div>
  <div id="pages">
    <div class="page active" id="p-add">
      <div id="tap-zone" class="tap-zone" onclick="tzTap()">
        <div class="tz-ic" id="tz-ic">📋</div>
        <div class="tz-t" id="tz-t">Appuyer pour ajouter</div>
        <div class="tz-s" id="tz-s">Copie un lien Instagram puis appuie ici — ou utilise le bouton + en haut</div>
      </div>
      <div id="prev-wrap"></div>
      <div class="nf" id="note-f" style="display:none"><div class="nf-ic">📝</div><textarea id="inp-note" placeholder="Notes — ex: 12K abonnés, photographe, DM ouvert…" rows="2"></textarea></div>
      <div class="b2b-row" id="b2b-f" style="display:none">
        <div><div class="b2b-l">Compte B2B 🏢</div><div class="b2b-s">Entreprise ou professionnel</div></div>
        <button class="tog" id="b2b-tog" onclick="togB2B()"><div class="tok"></div></button>
      </div>
      <button class="btn-add" id="btn-add" onclick="doAdd()" disabled>Ajouter à la liste</button>
    </div>
    <div class="page" id="p-list"><div id="list-body"></div></div>
  </div>
</div>
<!-- Note sheet -->
<div class="ov" id="note-ov" onclick="closeNote()"></div>
<div class="sh" id="note-sh">
  <div class="sh-handle"></div>
  <div class="sh-title">📝 Note</div>
  <textarea class="note-ta" id="note-ta" placeholder="Ex: 12K abonnés, DM ouvert, intéressé…"></textarea>
  <div class="sh-row"><button class="sh-c" onclick="closeNote()">Annuler</button><button class="sh-s" onclick="saveNote()">Enregistrer</button></div>
</div>
<!-- Confirm sheet -->
<div class="ov" id="cf-ov" onclick="closeCf()"></div>
<div class="sh" id="cf-sh">
  <div class="sh-handle"></div>
  <div class="cf-av" id="cf-av">?</div>
  <div class="cf-name" id="cf-name">@username</div>
  <div class="cf-meta" id="cf-meta">Prospection en cours</div>
  <button class="btn-done" onclick="markDone()">✅ Prospection terminée</button>
  <button class="btn-rst" onclick="resetP()">↩ Remettre à prospecter</button>
</div>
<div id="toast"><span id="t-ic">✓</span><span id="t-msg">OK</span></div>
<script>
let DB=JSON.parse(localStorage.getItem('igp5')||'[]');
const save=()=>localStorage.setItem('igp5',JSON.stringify(DB));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
let addSt={u:null,url:null,b2b:false};
let noteId=null,cfId=null,swId=null,lastClip='',clipCache=null;

function exIG(s){if(!s)return null;s=s.trim();const m=s.match(/instagram.com/([a-zA-Z0-9._]{1,30})/i);if(m)return m[1].replace(//$/,’’).toLowerCase();return null}
function isIG(s){return /instagram.com//i.test(s||’’)}
function igUrl(u){return’https://instagram.com/’+u}
function ini(u){return(u||’?’)[0].toUpperCase()}

// CLIPBOARD
async function readClip(){try{if(!navigator.clipboard?.readText)return null;return await navigator.clipboard.readText()}catch{return null}}
async function prefetch(){
const txt=await readClip();clipCache=txt;
if(txt&&isIG(txt)){const u=exIG(txt);if(u){document.getElementById(‘fab’).classList.add(‘has-ig’);setTZ(u);return}}
document.getElementById(‘fab’).classList.remove(‘has-ig’);
if(!addSt.u)resetTZ();
}
document.addEventListener(‘visibilitychange’,()=>{if(!document.hidden)prefetch()});
window.addEventListener(‘focus’,prefetch);

function setTZ(u){document.getElementById(‘tz-ic’).textContent=‘✨’;document.getElementById(‘tz-t’).textContent=’@’+u+’ détecté’;document.getElementById(‘tz-s’).textContent=‘Appuie pour ajouter instantanément’;document.getElementById(‘tap-zone’).classList.add(‘ready’)}
function resetTZ(){document.getElementById(‘tz-ic’).textContent=‘📋’;document.getElementById(‘tz-t’).textContent=‘Appuyer pour ajouter’;document.getElementById(‘tz-s’).textContent=‘Copie un lien Instagram puis appuie ici — ou utilise le bouton + en haut’;document.getElementById(‘tap-zone’).classList.remove(‘ready’)}

// FAB — instant add
async function fabTap(){
const fab=document.getElementById(‘fab’);
fab.classList.add(‘pop’);setTimeout(()=>fab.classList.remove(‘pop’),350);
const txt=clipCache||await readClip();clipCache=null;
if(!txt||!isIG(txt)){toast(‘📋’,‘Aucun lien Instagram copié’);return}
const u=exIG(txt);if(!u){toast(‘⚠️’,‘Lien invalide’);return}
if(DB.find(a=>a.username===u)){toast(‘⚠️’,’@’+u+’ déjà dans la liste’);return}
DB.unshift({id:uid(),username:u,url:igUrl(u),note:’’,b2b:false,status:‘prospect’,addedAt:Date.now(),activeAt:null});
save();updBadge();lastClip=txt;
toast(‘✅’,’@’+u+’ ajouté !’);
fab.classList.remove(‘has-ig’);resetTZ();
go(‘list’,document.querySelector(’[data-p=“list”]’));
}

// TAP ZONE — show preview + fields
async function tzTap(){
const txt=clipCache||await readClip();clipCache=null;
if(!txt||!isIG(txt)){toast(‘📋’,‘Aucun lien Instagram copié’);return}
const u=exIG(txt);if(!u)return;
if(DB.find(a=>a.username===u)){toast(‘⚠️’,’@’+u+’ déjà dans la liste’);return}
addSt={u,url:igUrl(u),b2b:false};
document.getElementById(‘prev-wrap’).innerHTML=`<div class="prev"><div class="prev-av">${ini(u)}</div><div class="prev-info"><div class="prev-name">@${u}</div><div class="prev-url">instagram.com/${u}</div></div><div class="prev-ok">✓</div></div>`;
document.getElementById(‘note-f’).style.display=‘flex’;
document.getElementById(‘b2b-f’).style.display=‘flex’;
document.getElementById(‘btn-add’).disabled=false;
document.getElementById(‘tap-zone’).style.display=‘none’;
lastClip=txt;
}

function togB2B(){addSt.b2b=!addSt.b2b;document.getElementById(‘b2b-tog’).classList.toggle(‘on’,addSt.b2b)}

function doAdd(){
if(!addSt.u)return;
const note=document.getElementById(‘inp-note’).value.trim();
DB.unshift({id:uid(),username:addSt.u,url:addSt.url,note,b2b:addSt.b2b,status:‘prospect’,addedAt:Date.now(),activeAt:null});
save();updBadge();
toast(‘✅’,’@’+addSt.u+’ ajouté !’);
resetAdd();
go(‘list’,document.querySelector(’[data-p=“list”]’));
}

function resetAdd(){
addSt={u:null,url:null,b2b:false};
document.getElementById(‘prev-wrap’).innerHTML=’’;
document.getElementById(‘note-f’).style.display=‘none’;
document.getElementById(‘b2b-f’).style.display=‘none’;
document.getElementById(‘btn-add’).disabled=true;
document.getElementById(‘inp-note’).value=’’;
document.getElementById(‘b2b-tog’).classList.remove(‘on’);
document.getElementById(‘tap-zone’).style.display=‘flex’;
resetTZ();
}

// URL PARAM (Shortcut)
function checkParam(){
const p=new URLSearchParams(location.search);
const raw=p.get(‘add’)||p.get(‘u’);if(!raw)return;
history.replaceState(null,’’,location.pathname);
const u=exIG(decodeURIComponent(raw));if(!u)return;
if(DB.find(a=>a.username===u)){toast(‘⚠️’,‘Déjà dans la liste’);return}
DB.unshift({id:uid(),username:u,url:igUrl(u),note:’’,b2b:false,status:‘prospect’,addedAt:Date.now(),activeAt:null});
save();updBadge();
toast(‘✅’,’@’+u+’ ajouté !’);
go(‘list’,document.querySelector(’[data-p=“list”]’));
}

// NAV
function go(name,btn){
const order=[‘add’,‘list’];
const ni=order.indexOf(name);
document.querySelectorAll(’.page’).forEach((p,i)=>{p.classList.remove(‘active’,‘left’);if(i<ni)p.classList.add(‘left’)});
document.getElementById(‘p-’+name).classList.add(‘active’);
document.querySelectorAll(’.nb’).forEach(b=>b.classList.remove(‘on’));
btn.classList.add(‘on’);
if(name===‘list’)renderList();
}

function updBadge(){document.getElementById(‘nb’).textContent=DB.length}

// LIST
function checkExpired(){
const TWO_H=7200000;let d=false;
DB.forEach(a=>{if(a.status===‘active_prospect’&&a.activeAt&&Date.now()-a.activeAt>TWO_H){a.status=‘prospect’;a.activeAt=null;d=true}});
if(d)save();
}

function renderList(){
checkExpired();updBadge();
const body=document.getElementById(‘list-body’);
if(!DB.length){body.innerHTML=’<div class="empty"><div class="em-ic">📋</div><div class="em-t">Liste vide</div><div class="em-s">Copie un lien Instagram et appuie sur + pour ajouter un compte.</div></div>’;return}
const act=DB.filter(a=>a.status===‘active_prospect’);
const pro=DB.filter(a=>a.status===‘prospect’);
const don=DB.filter(a=>a.status===‘done’);
let h=’’;
if(act.length)h+=’<div class="sec-hdr">En cours</div>’+act.map(rowH).join(’’);
if(pro.length)h+=’<div class="sec-hdr">À prospecter</div>’+pro.map(rowH).join(’’);
if(don.length)h+=’<div class="sec-hdr">Prospectés</div>’+don.map(rowH).join(’’);
body.innerHTML=h;
DB.forEach(a=>initSw(a.id));
}

function rowH(a){
const avc=a.status===‘active_prospect’?‘av gn act’:a.b2b?‘av bv’:‘av’;
const pill=a.status===‘active_prospect’?’<span class="pill pa">En cours…</span>’:a.status===‘done’?’<span class="pill pd">Prospecté ✓</span>’:’<span class="pill pp">À prospecter</span>’;
const b2bp=a.b2b?’<span class="pill pb">B2B</span>’:’’;
const sub=a.note||‘instagram.com/’+a.username;
const ring=a.status===‘active_prospect’?’<div class="av-ring"></div>’:’’;
return`<div class="rw" id="rw-${a.id}"><div class="sw-bg" id="sw-${a.id}"><button class="sw-b sw-b2b" onclick="togB2BList('${a.id}')"><div class="si">🏢</div>B2B</button><button class="sw-b sw-nt" onclick="openNote('${a.id}')"><div class="si">📝</div>Note</button><button class="sw-b sw-dl" onclick="delAcc('${a.id}')"><div class="si">🗑</div>Suppr.</button></div><div class="ar ani" id="ar-${a.id}" ondblclick="dblTap('${a.id}')"><div class="${avc}">${ini(a.username)}${ring}</div><div class="ri"><div class="rn">@${a.username}</div><div class="rs">${sub}</div></div><div class="rr">${b2bp}${pill}</div></div></div>`;
}

// SWIPE
function initSw(id){
const row=document.getElementById(‘ar-’+id);
if(!row)return;
const BW=216,SNAP=52;
let x0=0,dx=0,go=false,open=false;
row.addEventListener(‘touchstart’,e=>{if(swId&&swId!==id)closeSw(swId);x0=e.touches[0].clientX;dx=0;go=true;row.style.transition=‘none’},{passive:true});
row.addEventListener(‘touchmove’,e=>{if(!go)return;dx=e.touches[0].clientX-x0;if(open)dx-=BW;dx=Math.max(-BW,Math.min(0,dx));row.style.transform=`translateX(${dx}px)`},{passive:true});
row.addEventListener(‘touchend’,()=>{if(!go)return;go=false;row.style.transition=‘transform .26s cubic-bezier(.25,.46,.45,.94)’;if(dx<-SNAP){row.style.transform=`translateX(-${BW}px)`;open=true;swId=id}else{row.style.transform=‘none’;open=false;if(swId===id)swId=null}});
}
function closeSw(id){const r=document.getElementById(‘ar-’+id);if(!r)return;r.style.transition=‘transform .24s cubic-bezier(.25,.46,.45,.94)’;r.style.transform=‘none’;if(swId===id)swId=null}

// ACTIONS
function delAcc(id){DB=DB.filter(a=>a.id!==id);save();renderList();toast(‘🗑’,‘Supprimé’)}
function togB2BList(id){const a=DB.find(a=>a.id===id);if(!a)return;a.b2b=!a.b2b;save();renderList();toast(a.b2b?‘🏢’:‘✓’,a.b2b?‘Marqué B2B’:‘B2B retiré’)}

function openNote(id){
noteId=id;const a=DB.find(a=>a.id===id);
document.getElementById(‘note-ta’).value=a?.note||’’;
document.getElementById(‘note-ov’).classList.add(‘on’);
document.getElementById(‘note-sh’).classList.add(‘on’);
closeSw(id);
setTimeout(()=>document.getElementById(‘note-ta’).focus(),380);
}
function closeNote(){document.getElementById(‘note-ov’).classList.remove(‘on’);document.getElementById(‘note-sh’).classList.remove(‘on’);noteId=null}
function saveNote(){if(!noteId)return;const a=DB.find(a=>a.id===noteId);if(a){a.note=document.getElementById(‘note-ta’).value.trim();save()}closeNote();renderList();toast(‘📝’,‘Note enregistrée’)}

function dblTap(id){
const a=DB.find(a=>a.id===id);if(!a)return;
if(a.status===‘active_prospect’||a.status===‘done’){openCf(id);return}
a.status=‘active_prospect’;a.activeAt=Date.now();save();renderList();
toast(‘⏳’,‘Prospection lancée’);
setTimeout(()=>window.open(a.url,’_blank’),200);
}

function openCf(id){
cfId=id;const a=DB.find(a=>a.id===id);if(!a)return;
document.getElementById(‘cf-av’).textContent=ini(a.username);
document.getElementById(‘cf-name’).textContent=’@’+a.username;
const m=a.activeAt?Math.round((Date.now()-a.activeAt)/60000):0;
document.getElementById(‘cf-meta’).textContent=a.status===‘done’?‘Déjà prospecté’:m<1?‘Prospection en cours…’:‘En cours depuis ‘+m+’ min’;
document.getElementById(‘cf-ov’).classList.add(‘on’);
document.getElementById(‘cf-sh’).classList.add(‘on’);
}
function closeCf(){document.getElementById(‘cf-ov’).classList.remove(‘on’);document.getElementById(‘cf-sh’).classList.remove(‘on’);cfId=null}
function markDone(){if(!cfId)return;const a=DB.find(a=>a.id===cfId);if(a){a.status=‘done’;a.activeAt=null;save()}closeCf();renderList();toast(‘✅’,‘Prospecté !’)}
function resetP(){if(!cfId)return;const a=DB.find(a=>a.id===cfId);if(a){a.status=‘prospect’;a.activeAt=null;save()}closeCf();renderList();toast(‘↩’,‘Remis à prospecter’)}

// TOAST
let tt;
function toast(ic,msg){document.getElementById(‘t-ic’).textContent=ic;document.getElementById(‘t-msg’).textContent=msg;const el=document.getElementById(‘toast’);el.classList.add(‘show’);clearTimeout(tt);tt=setTimeout(()=>el.classList.remove(‘show’),2400)}

// INIT
updBadge();checkParam();prefetch();
document.addEventListener(‘visibilitychange’,()=>{if(!document.hidden){checkExpired();if(document.getElementById(‘p-list’).classList.contains(‘active’))renderList()}});
</script>

</body>
